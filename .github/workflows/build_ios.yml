name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main ]      # 当你推送到 main 分支时自动触发
  workflow_dispatch:        # 也支持手动触发

jobs:
  build:
    runs-on: macos-latest   # iOS 构建必须使用 macOS 运行器

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6   # 可以改成你项目用的版本
          cache: true

      # 3. 安装项目依赖
      - name: Install dependencies
        run: flutter pub get

      # 4. 安装 CocoaPods 依赖（iOS 项目需要）
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # 5. 构建 iOS 应用（不签名）
      - name: Build iOS app (unsigned)
        run: flutter build ios --release --no-codesign

      # 6. 创建 Payload 文件夹并打包成 IPA
      - name: Create IPA from .app
        run: |
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r app-unsigned.ipa Payload/

      # 7. 上传构建产物（供下载）
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned
          path: app-unsigned.ipa
          retention-days: 7   # 文件保留7天